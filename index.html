<style>
:root {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --surface2: #f0f2f5;
  --text: #0d1b2a;
  --text2: #5a6472;
  --text3: #9aa3ad;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --red: #E63946;
  --blue: #185FA5;
  --teal: #2A9D8F;
  --amber: #B5830A;
  --swim: #0077B6;
  --radius: 12px;
  --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d;
    --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.app { max-width: 440px; margin: 0 auto; padding-bottom: 2rem; }

.top-bar { background: #0D1B2A; padding: 52px 16px 12px; position: sticky; top: 0; z-index: 100; }
.top-bar .eyebrow { font-size: 12px; font-weight: 500; color: #7a8a99; letter-spacing: .6px; text-transform: uppercase; }
.top-bar h1 { font-size: 20px; font-weight: 600; color: #fff; margin: 2px 0 10px; }
.nav-row { display: flex; gap: 6px; }
.nav-btn { flex: 1; padding: 8px 0; border-radius: var(--radius-sm); border: 1px solid rgba(255,255,255,0.12); background: transparent; color: #99aabb; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s; }
.nav-btn.active { background: var(--red); border-color: var(--red); color: #fff; }

.tomorrow-banner { margin: 12px 16px 0; background: #EBF3FC; border: 1px solid #B5D4F4; border-radius: var(--radius); padding: 10px 14px; }
@media (prefers-color-scheme: dark) { .tomorrow-banner { background: #0C2440; border-color: #185FA5; } }
.tomorrow-banner .tb-label { font-size: 12px; font-weight: 600; color: var(--blue); margin-bottom: 6px; }
.tomorrow-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tomorrow-tag { font-size: 12px; background: var(--surface); border: 1px solid #B5D4F4; border-radius: 20px; padding: 3px 10px; color: var(--blue); display: flex; align-items: center; gap: 4px; }

/* CALENDAR */
.cal-wrap { padding: 12px 16px 0; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.cal-header button { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; color: var(--text2); font-size: 15px; }
.cal-month { font-size: 15px; font-weight: 600; color: var(--text); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
.cal-dow { font-size: 10px; font-weight: 600; color: var(--text3); text-align: center; padding: 4px 0; text-transform: uppercase; }
.cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: var(--radius-sm); cursor: pointer; border: 1px solid transparent; position: relative; transition: background .1s; gap: 2px; }
.cal-day:hover { background: var(--surface2); }
.cal-day.active { background: var(--red); border-color: var(--red); }
.cal-day.active .cal-day-num { color: #fff; }
.cal-day.today-marker { border-color: var(--red); }
.cal-day.today-marker .cal-day-num { color: var(--red); font-weight: 700; }
.cal-day.active.today-marker .cal-day-num { color: #fff; }
.cal-day.other-month { opacity: 0.3; cursor: default; }
.cal-day.no-plan { cursor: default; }
.cal-day-num { font-size: 13px; color: var(--text); line-height: 1; }
.cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; }
.cal-dot { width: 4px; height: 4px; border-radius: 50%; }

.section { padding: 12px 16px 0; }
.day-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.day-header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); flex-shrink: 0; }
.day-header h2 { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
.badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 600; }
.badge-hoje { background: var(--red); color: #fff; }
.badge-amanha { background: var(--blue); color: #fff; }
.badge-fase { background: var(--surface2); color: var(--text2); }
.phase-chip { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 20px; margin-bottom: 10px; font-weight: 500; }

.treino-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
.treino-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
.treino-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 17px; }
.treino-meta { flex: 1; }
.treino-meta .time { font-size: 11px; color: var(--text3); }
.treino-meta .name { font-size: 14px; font-weight: 600; color: var(--text); margin-top: 1px; }
.chevron { font-size: 16px; color: var(--text3); transition: transform .2s; }
.chevron.open { transform: rotate(180deg); }
.treino-body { border-top: 1px solid var(--border); padding: 12px 14px 14px; }
.detail-line { font-size: 13px; color: var(--text2); line-height: 1.7; }
.ex-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
.ex-table th { font-size: 11px; font-weight: 600; color: var(--text3); text-align: left; padding: 5px 0; border-bottom: 1px solid var(--border); }
.ex-table th:last-child { text-align: right; }
.ex-table td { font-size: 12px; color: var(--text); padding: 7px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
.ex-table td:first-child { color: var(--text3); font-size: 11px; width: 22px; }
.ex-table td:last-child { color: var(--text2); font-size: 11px; text-align: right; width: 58px; padding-left: 8px; }
.ex-name { font-weight: 600; font-size: 12px; }
.ex-sets { font-size: 11px; color: var(--text2); margin-top: 2px; }
.alert-box { font-size: 11px; margin-top: 5px; padding: 5px 8px; border-radius: 6px; background: #FFF8E1; color: #7B5800; border-left: 3px solid #F59E0B; }
@media (prefers-color-scheme: dark) { .alert-box { background: #2D2000; color: #F59E0B; } }
.rest-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; color: var(--text3); font-size: 14px; margin-bottom: 10px; }
.rest-card i { font-size: 24px; display: block; margin: 0 auto 8px; }
.race-card { background: var(--red); border-radius: var(--radius); padding: 24px; text-align: center; margin-bottom: 10px; }
.race-card i { font-size: 36px; color: #fff; display: block; margin: 0 auto 10px; }
.race-card h3 { color: #fff; font-size: 18px; font-weight: 700; }
.race-card p { color: rgba(255,255,255,0.85); font-size: 13px; margin-top: 6px; }
</style>

    ["Prancha + toque de ombro","3×20 alt.","0'45''",null]
  ]},
  3:{titulo:"Full Body – Potência Específica (Sexta)",exercicios:[
    ["Afundo com halteres (explosivo)","4×8/perna","1'30''",null],
    ["Hip Thrust com haltere","4×10 (iso 2'' topo)","1'30''",null],
    ["Leg Curl pesado","3×8 (excêntrico 3'')","1'30''","Posterior sem tensão excessiva – carga moderada-alta."],
    ["Panturrilha explosiva","4×10 (subida rápida)","1'00''",null],
    ["Kettlebell swing duplo","3×10","1'30''",null],
    ["Puxada supinada (Chin-up)","3×5","2'00''",null],
    ["Crucifixo com halteres","3×10","1'30''",null],
    ["Face pull alto corda","3×15","1'00''",null],
    ["Prancha lateral com elevação de quadril","3×10/lado","0'45''",null]
  ]},
  4:{titulo:"Full Body – Taper / Manutenção (Sexta)",exercicios:[
    ["Afundo leve","3×8/perna","1'30''",null],
    ["Leg Curl leve","3×8","1'30''","Taper – carga leve, manter estímulo."],
    ["Panturrilha em pé","3×10","1'00''",null],
    ["Puxada frontal","3×5 (moderado)","2'00''",null],
    ["Supino reto halteres","3×6","1'30''",null],
    ["Face pull corda","3×15","1'00''",null],
    ["Prancha frontal","3×35''","0'45''",null]
  ]}
};

function gymIdx(s){return s<=4?1:s<=8?2:s<=12?3:4;}
function dd(a,b){return Math.round((b-a)/86400000);}
function getSem(d){const x=dd(PLAN_START,d);if(x<0)return null;return Math.floor(x/7)+1;}

// Returns list of activity types for a given date (for calendar dots)
function getActivityTypes(date) {
  if(date<PLAN_START||date>PLAN_END) return [];
  const sem=getSem(date); if(!sem||sem>14) return [];
  const dow=date.getDay(), types=[];
  if(dow===0) types.push('corrida');
  if(dow===1){types.push('natacao');types.push('bike');types.push('pilates');}
  if(dow===2){types.push('spinning');types.push('academia');types.push('corrida');}
  if(dow===3){types.push('natacao');types.push('academia');}
  if(dow===4){types.push('corrida');types.push('spinning');}
  if(dow===5){types.push('natacao');types.push('bike');types.push('academia');}
  if(dow===6) types.push('bike');
  if(date.getDate()===20&&date.getMonth()===8&&date.getFullYear()===2026) return ['prova'];
  return types;
}

function getDay(date){
  if(date<PLAN_START||date>PLAN_END) return null;
  const sem=getSem(date); if(!sem||sem>14) return null;
  const dow=date.getDay(),phase=getPhase(sem),gi=gymIdx(sem),tr=[];
  if(dow===0){
    if(date.getDate()===20&&date.getMonth()===8&&date.getFullYear()===2026) return{prova:true,sem,phase};
    tr.push({tipo:'corrida',hora:'manhã',label:'Corrida – Longa',det:RUN_SUN[sem]});
  }
  if(dow===1){tr.push({tipo:'natacao',hora:'06:15',label:'Natação – Série Principal',det:SWIM[sem][0]});tr.push({tipo:'bike',hora:'12:00',label:'Bike Rua – Segunda',det:BIKE_MON[sem]});tr.push({tipo:'pilates',hora:'19:00',label:'Pilates',det:'Mobilidade e postura'});}
  if(dow===2){tr.push({tipo:'spinning',hora:'08:00',label:'Spinning',det:'Bike indoor'});tr.push({tipo:'academia',hora:'19:00',label:'Academia – '+GYM_SUP[gi].titulo,det:null,exs:GYM_SUP[gi].exercicios});tr.push({tipo:'corrida',hora:'20:00',label:'Corrida – Terça',det:RUN_TUE[sem]});}
  if(dow===3){tr.push({tipo:'natacao',hora:'06:15',label:'Natação – Série Principal',det:SWIM[sem][1]});tr.push({tipo:'academia',hora:'19:00',label:'Academia – '+GYM_INF[gi].titulo,det:null,exs:GYM_INF[gi].exercicios});}
  if(dow===4){tr.push({tipo:'corrida',hora:'06:00',label:'Corrida – Quinta (Rua)',det:RUN_THU[sem]});tr.push({tipo:'spinning',hora:'19:00',label:'Spinning',det:'Bike indoor'});}
  if(dow===5){tr.push({tipo:'natacao',hora:'06:15',label:'Natação – Série Principal',det:SWIM[sem][2]});tr.push({tipo:'bike',hora:'12:00',label:'Bike Rua – 29km',det:BIKE_FRI[sem]});const friFB=date>=new Date(2026,6,17)&&gi>=2&&GYM_FB[gi];const friGym=friFB?GYM_FB[gi]:GYM_SUP[gi];tr.push({tipo:'academia',hora:'19:00',label:'Academia – '+friGym.titulo,det:null,exs:friGym.exercicios});}
  if(dow===6) tr.push({tipo:'bike',hora:'manhã',label:'Bike – Longa',det:BIKE_SAT[sem]});
  return{tr,sem,phase};
}

const TI={
  natacao:{i:'__swim__',bg:'#E6F1FB',c:'#0077B6'},
  bike:{i:'ti-bike',bg:'#FAEEDA',c:'#854F0B'},
  corrida:{i:'ti-run',bg:'#EAF3DE',c:'#3B6D11'},
  academia:{i:'ti-barbell',bg:'#EEEDFE',c:'#534AB7'},
  spinning:{i:'ti-bike',bg:'#FFF0E6',c:'#993C1D'},
  pilates:{i:'ti-heart',bg:'#FBEAF0',c:'#993556'},
};
const DOT_COLOR={
  natacao:'#0077B6', bike:'#854F0B', corrida:'#3B6D11',
  academia:'#534AB7', spinning:'#993C1D', pilates:'#993556', prova:'#E63946'
};

let view='hoje', navD=new Date(), calYear=2026, calMonth=5, exp={};

function today(){const d=new Date();d.setHours(0,0,0,0);return d;}
function tomorrow(){const d=today();d.setDate(d.getDate()+1);return d;}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
const DAYS=['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'];
const MONTHS_LONG=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const MONTHS=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
const DOWS=['D','S','T','Q','Q','S','S'];
function fmt(d){return DAYS[d.getDay()]+', '+d.getDate()+' de '+MONTHS[d.getMonth()];}
function fmts(d){return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0');}

function toggle(id){exp[id]=!exp[id];render();}

function buildDay(date,bl,bc){
  const data=getDay(date);
  let h=`<div class="day-header"><div class="dot"></div><h2>${fmt(date)}</h2>${bl?`<span class="badge ${bc}">${bl}</span>`:''}</div>`;
  if(data&&data.prova){h+=`<div class="race-card"><i class="ti ti-trophy"></i><h3>DIA DA PROVA</h3><p>Natação 1,9 km · Bike 90 km · Corrida 21,1 km</p></div>`;return h;}
  if(!data||!data.tr||!data.tr.length){h+=`<div class="rest-card"><i class="ti ti-zzz"></i>Dia de descanso</div>`;return h;}
  const{tr,sem,phase}=data;
  if(phase)h+=`<div><span class="phase-chip" style="background:${phase.color}18;color:${phase.color}">Semana ${sem} · ${phase.name}</span></div>`;
  tr.forEach((t,i)=>{
    const id=fmts(date)+'_'+i,ti=TI[t.tipo]||TI.corrida,open=!!exp[id];
    h+=`<div class="treino-card"><div class="treino-header" onclick="toggle('${id}')"><div class="treino-icon" style="background:${ti.bg}"><i class="ti ${ti.i}" style="color:${ti.c};font-size:17px"></i></div><div class="treino-meta"><div class="time">${t.hora}</div><div class="name">${t.label}</div></div><i class="ti ti-chevron-down chevron${open?' open':''}"></i></div>`;
    if(open){
      h+=`<div class="treino-body">`;
      if(t.exs){
        h+=`<table class="ex-table"><thead><tr><th>#</th><th>Exercício</th><th>Desc.</th></tr></thead><tbody>`;
        t.exs.forEach((ex,ei)=>{h+=`<tr><td>${ei+1}</td><td><div class="ex-name">${ex[0]}</div><div class="ex-sets">${ex[1]}</div>${ex[3]?`<div class="alert-box">⚠️ ${ex[3]}</div>`:''}</td><td>${ex[2]}</td></tr>`;});
        h+=`</tbody></table>`;
      } else if(t.det){
        t.det.split('\n').forEach(l=>{h+=`<p class="detail-line">${l}</p>`;});
      }
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  return h;
}

function buildTomorrow(){
  const tom=tomorrow(),data=getDay(tom);
  if(!data||!data.tr||!data.tr.length||view!=='hoje'){document.getElementById('tomorrow-banner').innerHTML='';return;}
  const tags=data.tr.map(t=>`<span class="tomorrow-tag" style="color:${(TI[t.tipo]||{c:'#185FA5'}).c}">${(TI[t.tipo]||{i:'ti-run'}).i==='__swim__'?'<svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"vertical-align:-2px\"><circle cx=\"7\" cy=\"7\" r=\"2\"/><path d=\"M22 20a5 5 0 0 1-4-2 5 5 0 0 1-4 2 5 5 0 0 1-4-2 5 5 0 0 1-4 2\"/><path d=\"M12 20v-9l-3 3\"/><path d=\"M7 14l3-3 3-3 3 3\"/></svg>':`<i class=\"ti ${(TI[t.tipo]||{i:'ti-run'}).i}\" style=\"font-size:12px\"></i>`}${t.tipo}</span>`).join('');
  document.getElementById('tomorrow-banner').innerHTML=`<div class="tomorrow-banner"><div class="tb-label"><i class="ti ti-calendar-event" style="font-size:13px;vertical-align:-2px;margin-right:4px"></i>Amanhã (${fmts(tom)})</div><div class="tomorrow-tags">${tags}</div></div>`;
}

function buildCalendar(){
  const firstDay=new Date(calYear,calMonth,1);
  const lastDay=new Date(calYear,calMonth+1,0);
  const startDow=firstDay.getDay();
  const td=today();

  let h=`<div class="cal-wrap">`;
  h+=`<div class="cal-header">`;
  h+=`<button onclick="calPrev()"><i class="ti ti-chevron-left"></i></button>`;
  h+=`<span class="cal-month">${MONTHS_LONG[calMonth]} ${calYear}</span>`;
  h+=`<button onclick="calNext()"><i class="ti ti-chevron-right"></i></button>`;
  h+=`</div>`;
  h+=`<div class="cal-grid">`;
  DOWS.forEach(d=>{h+=`<div class="cal-dow">${d}</div>`;});

  // blanks before
  for(let i=0;i<startDow;i++){
    h+=`<div class="cal-day other-month"><span class="cal-day-num"></span></div>`;
  }

  for(let day=1;day<=lastDay.getDate();day++){
    const d=new Date(calYear,calMonth,day);
    const types=getActivityTypes(d);
    const isToday=sameDay(d,td);
    const isSelected=sameDay(d,navD)&&view==='navegar';
    const inPlan=d>=PLAN_START&&d<=PLAN_END;
    let cls='cal-day';
    if(isSelected) cls+=' active';
    if(isToday&&!isSelected) cls+=' today-marker';
    if(!inPlan) cls+=' no-plan';

    const dots=types.slice(0,4).map(t=>`<div class="cal-dot" style="background:${isSelected?'rgba(255,255,255,0.8)':DOT_COLOR[t]||'#999'}"></div>`).join('');

    h+=`<div class="${cls}" onclick="${inPlan?`pickDay(${calYear},${calMonth},${day})`:''}">`;
    h+=`<span class="cal-day-num">${day}</span>`;
    if(dots) h+=`<div class="cal-dots">${dots}</div>`;
    h+=`</div>`;
  }

  // fill remaining
  const total=startDow+lastDay.getDate();
  const remainder=total%7;
  if(remainder>0){for(let i=0;i<7-remainder;i++) h+=`<div class="cal-day other-month"></div>`;}
  h+=`</div></div>`;
  return h;
}

function pickDay(y,m,day){
  navD=new Date(y,m,day);
  exp={};
  document.getElementById('cal-container').innerHTML=buildCalendar();
  document.getElementById('content-area').innerHTML=buildDay(navD,'','badge-fase');
}
function calPrev(){if(calMonth===0){calMonth=11;calYear--;}else calMonth--;document.getElementById('cal-container').innerHTML=buildCalendar();}
function calNext(){if(calMonth===11){calMonth=0;calYear++;}else calMonth++;document.getElementById('cal-container').innerHTML=buildCalendar();}

function render(){
  const area=document.getElementById('content-area'),title=document.getElementById('top-title');
  const cal=document.getElementById('cal-container');
  ['hoje','amanha','navegar'].forEach(v=>document.getElementById('btn-'+v).classList.toggle('active',view===v));
  document.getElementById('tomorrow-banner').innerHTML='';
  if(view==='hoje'){
    title.textContent='Hoje';
    cal.style.display='none';
    area.innerHTML=buildDay(today(),'Hoje','badge-hoje');
    buildTomorrow();
  } else if(view==='amanha'){
    title.textContent='Amanhã';
    cal.style.display='none';
    area.innerHTML=buildDay(tomorrow(),'Amanhã','badge-amanha');
  } else {
    title.textContent='Calendário';
    cal.style.display='block';
    calMonth=navD.getMonth(); calYear=navD.getFullYear();
    cal.innerHTML=buildCalendar();
    area.innerHTML=buildDay(navD,'','badge-fase');
  }
}
function setView(v){
  view=v;
  if(v==='navegar'){navD=today();calMonth=navD.getMonth();calYear=navD.getFullYear();}
  exp={};render();
}
render();
</script>
